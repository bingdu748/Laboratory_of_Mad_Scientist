name: Generate README

# 互斥锁：同一时间只允许一个实例运行，新触发会取消旧运行
concurrency:
  group: master-branch-write
  cancel-in-progress: true

on:
  # 实时触发：issue 事件
  issues:
    types: [opened, edited, labeled, unlabeled, closed]
  issue_comment:
    types: [created, edited, deleted]
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "feed.xml"
      - "posts/**"

  # 每天定时执行：生成并提交 README.md 和 feed.xml
  schedule:
    # 每天北京时间 23:45 (UTC 15:45) 执行
    - cron: '45 15 * * *'

  # 手动触发
  workflow_dispatch:

jobs:
  # 合并为单 job：生成 posts → 生成 README → 一次 commit → 一次 push
  generate-all:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Shanghai
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      # ========== Step 0: 运行单元测试（跨环境一致性验证） ==========
      - name: Run unit tests
        run: |
          echo "=== 运行跨环境一致性测试 ==="
          python -m unittest scripts.test_utils -v
          echo "=== 所有测试通过 ==="

      # ========== Step 1: 生成 posts/ 下的 .md 文件（非 schedule 时执行） ==========
      - name: Generate issue .md files
        if: github.event_name != 'schedule'
        run: |
          ISSUE_NUMBER=""
          if [ "${{ github.event_name }}" == "issues" ] || [ "${{ github.event_name }}" == "issue_comment" ]; then
            ISSUE_NUMBER="${{ github.event.issue.number }}"
          fi

          if [ -n "$ISSUE_NUMBER" ]; then
            echo "处理 issue #$ISSUE_NUMBER (event: ${{ github.event_name }})"
            python scripts/generate_posts.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number $ISSUE_NUMBER
          else
            echo "未指定 issue，处理所有 issue"
            python scripts/generate_posts.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }}
          fi

      # ========== Step 2: 生成 README.md 和 feed.xml ==========
      - name: Generate README and feed.xml
        run: |
          python scripts/update_readme.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }}

      # ========== Step 3: 一次 commit + push 所有变更 ==========
      - name: Commit and push all changes
        run: |
          # 检查是否有任何文件变更
          if git diff --exit-code --quiet && git diff --cached --exit-code --quiet; then
            echo "没有文件变更，跳过提交"
            exit 0
          fi

          echo "检测到文件变更，准备提交"

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 配置自动合并驱动：README.md / feed.xml / CHANGELOG.md 冲突时使用本地版本
          git config merge.ours.driver 'git merge-file --ours %A %O %B'

          today=$(date +"%Y-%m-%d")

          git add --all

          # stash 可能存在的无关变更（如 metadata 文件），但保留已 git add 的
          git stash push --keep-index --include-untracked -m "WIP" 2>/dev/null || echo "No other changes to stash"

          git commit -m "Auto-update: $today"

          # 拉取远程最新并 rebase
          git fetch origin master
          if ! git rebase origin/master; then
            echo "Rebase 冲突，中止并使用 merge 策略（优先保留本地生成内容）"
            git rebase --abort
            git merge origin/master -X ours -m "Auto-update: $today"
          fi

          # 恢复 stash
          git stash pop 2>/dev/null || echo "No stash to restore"

          git push origin HEAD:master