name: Generate README

on:
  # 实时触发：issue 事件
  issues:
    types: [opened, edited, labeled, unlabeled, closed]
  issue_comment:
    types: [created, edited, deleted]
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "feed.xml"

  # 每天定时执行：生成并提交 README.md 和 feed.xml
  schedule:
    # 每天北京时间 23:45 (UTC 15:45) 执行
    - cron: '45 15 * * *'

  # 手动触发
  workflow_dispatch:

jobs:
  # 生成 issue 的 .md 文件（实时触发）
  generate-posts:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Shanghai
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Generate issue files
        run: |
          ISSUE_NUMBER=""
          if [ "${{ github.event_name }}" == "issues" ]; then
            ISSUE_NUMBER="${{ github.event.issue.number }}"
          fi

          if [ "${{ github.event_name }}" == "issues" ] && [ "${{ github.event.action }}" == "closed" ]; then
            echo "Issue #$ISSUE_NUMBER 已关闭，执行删除操作"
            python scripts/generate_posts.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number $ISSUE_NUMBER
          else
            python scripts/generate_posts.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number $ISSUE_NUMBER
          fi

      - name: Commit and push issue files
        run: |
          # 暂存 README.md 和 feed.xml（如果被意外修改则还原）
          git checkout -- README.md feed.xml 2>/dev/null || true

          # 检查是否有文件变更
          if git diff --exit-code --quiet && git diff --cached --exit-code --quiet; then
            echo "没有文件变更，跳过提交"
            exit 0
          fi

          echo "检测到 issue 文件变更，准备提交"

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add --all
          git checkout -- README.md feed.xml 2>/dev/null || true

          git stash push --keep-index --include-untracked -m "WIP" 2>/dev/null || true

          git commit -m "Auto-update: issue files"

          git fetch origin master
          git rebase origin/master || (git rebase --abort && git pull origin master --strategy-option=ours)

          git stash pop 2>/dev/null || true
          git push origin HEAD:master

  # 生成 README.md 和 feed.xml
  generate-readme:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' || github.event_name == 'issue_comment' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Shanghai
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Generate README and feed.xml
        run: |
          python scripts/update_readme.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }}

      - name: Commit and push changes
        run: |
          # 检查 README.md 或 feed.xml 是否有变更
          if git diff --exit-code README.md feed.xml 2>/dev/null; then
            echo "没有文件变更，跳过提交"
            exit 0
          fi

          echo "检测到文件变更，准备提交"

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          today=$(date +"%Y-%m-%d")

          git add README.md feed.xml

          git stash push --keep-index --include-untracked -m "WIP-BACKUP" || echo "No other changes to stash"

          git commit -m "Auto-update: $today"

          git fetch origin master
          git rebase origin/master || (git rebase --abort && git pull origin master --strategy-option=ours)

          git stash pop || echo "No stash to restore"
          git push origin HEAD:master
