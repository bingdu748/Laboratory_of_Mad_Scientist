name: Deploy static content to Pages

on:
  push:
    branches:
      - main
      - master
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened
      - labeled
      - unlabeled
  issue_comment:
    types:
      - created
      - edited
      - deleted
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}
      ISITE_VERSION: v0.2.2
      ZOLA_VERSION: v0.20.0
      USER: ${{ github.repository_owner }}
      REPO_FULL_NAME: ${{ github.repository }}
      BASE_URL: https://${{ github.repository_owner }}.github.io/
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Debug info
        run: |
          export ACTIONS_STEP_DEBUG=true
          export ACTIONS_RUNNER_DEBUG=true
          # 设置 REPO 变量
          REPO=$(echo "${{ github.repository }}" | cut -d '/' -f 2)
          echo "REPO=$REPO" >> $GITHUB_ENV
          # 设置 BASE_URL
          BASE_URL="https://${{ github.repository_owner }}.github.io/$REPO"
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV
          echo "=== Current directory contents ==="
          ls -la
          echo "=== Environment info ==="
          echo "USER: $USER"
          echo "REPO: $REPO"
          echo "BASE_URL: $BASE_URL"

      - name: Generate markdown
        run: |
          set -ex
          export ACTIONS_STEP_DEBUG=true
          export ACTIONS_RUNNER_DEBUG=true
          
          # Download and install isite using gh CLI
          gh release download $ISITE_VERSION --repo kemingy/isite -p '*Linux_x86_64*' -O- | tar -xz -C /tmp && mv /tmp/isite /usr/local/bin
          isite --version
          isite generate --user "$USER" --repo "$REPO"
          
          # Download and install zola using gh CLI
          gh release download $ZOLA_VERSION --repo getzola/zola -p '*x86_64-unknown-linux*' -O- | tar -xz -C /tmp && mv /tmp/zola /usr/local/bin
          zola --version
          
          echo "=== Output directory contents ==="
          ls -la output/
          
          cd output
          zola build --base-url "$BASE_URL"
          
          echo "=== Public directory contents ==="
          ls -la public/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4