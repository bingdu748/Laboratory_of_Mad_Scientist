name: Deploy static content to Pages

on:
  push:
    branches:
      - main
      - master
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened
      - labeled
      - unlabeled
  issue_comment:
    types:
      - created
      - edited
      - deleted
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}
      ISITE_VERSION: v0.1.3
      ZOLA_VERSION: v0.17.2
      USER: ${{ github.repository_owner }}
      REPO_FULL_NAME: ${{ github.repository }}
      BASE_URL: https://${{ github.repository_owner }}.github.io/
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Debug info
        run: |
          export ACTIONS_STEP_DEBUG=true
          export ACTIONS_RUNNER_DEBUG=true
          # 设置 REPO 变量
          REPO=$(echo "${{ github.repository }}" | cut -d '/' -f 2)
          echo "REPO=$REPO" >> $GITHUB_ENV
          # 设置 BASE_URL
          BASE_URL="https://${{ github.repository_owner }}.github.io/$REPO"
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV
          echo "=== Current directory contents ==="
          ls -la
          echo "=== Environment info ==="
          echo "USER: $USER"
          echo "REPO: $REPO"
          echo "BASE_URL: $BASE_URL"

      - name: Generate markdown
        run: |
          set -ex
          export ACTIONS_STEP_DEBUG=true
          export ACTIONS_RUNNER_DEBUG=true
          
          # Download and install isite
          curl -L -o isite.tar.gz "https://github.com/kemingy/isite/releases/download/${ISITE_VERSION}/isite_Linux_x86_64.tar.gz"
          tar zxf isite.tar.gz
          sudo mv isite /usr/local/bin
          isite --version
          isite generate --user "$USER" --repo "$REPO"
          
          # Download and install zola
          curl -L -o zola.tar.gz "https://github.com/getzola/zola/releases/download/${ZOLA_VERSION}/zola-${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar zxf zola.tar.gz
          sudo mv zola /usr/local/bin
          zola --version
          
          echo "=== Output directory contents ==="
          ls -la output/
          
          cd output
          zola build --base-url "$BASE_URL"
          
          echo "=== Public directory contents ==="
          ls -la public/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'output/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5