name: Deploy static content to Pages

on:
  # README.md 更新后自动部署 Pages
  push:
    branches:
      - main
      - master
    paths:
      - "README.md"
      - "feed.xml"
  # 手动触发（用于首次部署或修复）
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}
      ISITE_VERSION: v0.2.2
      ZOLA_VERSION: v0.20.0
      USER: ${{ github.repository_owner }}
      REPO_FULL_NAME: ${{ github.repository }}
      BASE_URL: https://${{ github.repository_owner }}.github.io/
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Debug info
        run: |
          export ACTIONS_STEP_DEBUG=true
          export ACTIONS_RUNNER_DEBUG=true
          # 设置 REPO 变量
          REPO=$(echo "${{ github.repository }}" | cut -d '/' -f 2)
          echo "REPO=$REPO" >> $GITHUB_ENV
          # 设置 BASE_URL
          BASE_URL="https://${{ github.repository_owner }}.github.io/$REPO"
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV
          echo "=== Current directory contents ==="
          ls -la
          echo "=== Environment info ==="
          echo "USER: $USER"
          echo "REPO: $REPO"
          echo "BASE_URL: $BASE_URL"

      - name: Generate markdown
        run: |
          set -ex
          export ACTIONS_STEP_DEBUG=true
          export ACTIONS_RUNNER_DEBUG=true
          
          # Download and install isite using gh CLI
          echo "=== Starting isite installation ==="
          echo "Downloading isite version: $ISITE_VERSION"
          if gh release download $ISITE_VERSION --repo kemingy/isite -p '*Linux_x86_64*' -O- | tar -xz -C /tmp; then
            echo "isite downloaded and extracted successfully"
          else
            echo "ERROR: Failed to download isite"
            exit 1
          fi
          
          echo "Moving isite to /usr/local/bin..."
          if mv /tmp/isite /usr/local/bin; then
            echo "isite installed successfully"
          else
            echo "ERROR: Failed to install isite"
            exit 1
          fi
          
          echo "Checking isite version..."
          isite version
          
          echo "=== Starting isite generate ==="
          echo "Generating markdown for user: $USER, repo: $REPO"
          if isite generate --user "$USER" --repo "$REPO"; then
            echo "isite generate completed successfully"
          else
            echo "ERROR: isite generate failed"
            exit 1
          fi
          
          # Download and install zola using gh CLI
          echo ""
          echo "=== Starting zola installation ==="
          echo "Downloading zola version: $ZOLA_VERSION"
          if gh release download $ZOLA_VERSION --repo getzola/zola -p '*x86_64-unknown-linux*' -O- | tar -xz -C /tmp; then
            echo "zola downloaded and extracted successfully"
          else
            echo "ERROR: Failed to download zola"
            exit 1
          fi
          
          echo "Moving zola to /usr/local/bin..."
          if mv /tmp/zola /usr/local/bin; then
            echo "zola installed successfully"
          else
            echo "ERROR: Failed to install zola"
            exit 1
          fi
          
          echo "Checking zola version..."
          zola --version
          
          echo "=== Output directory contents ==="
          ls -la output/
          
          cd output
          zola build --base-url "$BASE_URL"
          
          echo "=== Public directory contents ==="
          ls -la public/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'output/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5